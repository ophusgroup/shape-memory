# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: shape-memory-elastocaloric
  title: Atomistic Shape-Memory & Elastocaloric Simulations
  short_title: Shape Memory
  description: Interactive atomistic demos of NiTi shape-memory and elastocaloric behavior, powered by MACE-MP0 machine-learning molecular dynamics.
  keywords:
    - Shape memory alloys
    - NiTi
    - Elastocalorics
    - Martensitic transformation
    - Machine-learning potentials
    - MACE
  github: https://github.com/ophusgroup/shape-memory
  resources:
    - widgets/**/*
  exclude:
    - README.md
    - results.md
    - methods.md
    - scripts/**
    - src/**
    - .venv/**
    - .github/**
  toc:
    - file: index.md
    - title: Physics
      children:
        - file: background.md
        - file: elastocaloric.md
    - title: Methods
      children:
        - file: methods-potential.md
        - file: methods-loading.md
        - file: methods-observables.md
    - title: Simulated results
      children:
        - file: mechanism.md
        - file: demos.md
        - file: shape-memory.md
        - file: microstructure.md
        - file: polycrystal.md
        - file: orientation.md
        - file: texture.md
    - title: Reference
      children:
        - file: references.md
site:
  template: book-theme
  title: Nitinol Shape Memory & Elastocalorics
  options:
    style: ./style.css
    logo_text: Nitinol Shape Memory & Elastocalorics
    outline_maxdepth: 2
    hide_search: false
    hide_footer_links: true
  parts:
    footer: |
      An interactive demo from the [Colin Ophus Lab](https://colab.stanford.edu), Department of Materials Science & Engineering, Stanford University. This work is supported by the project Development of NiTi Alloys for Energy-Efficient Elastocaloric Applications through Nanostructural Analysis (Electricity and Grid Systems cohort, PI Robert Sinclair).
